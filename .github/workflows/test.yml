name: Test

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run tests
        run: python -m pytest tests

      - name: Compile integration
        run: >-
          python -m py_compile
          custom_components/plaineo/__init__.py
          custom_components/plaineo/api.py
          custom_components/plaineo/auth.py
          custom_components/plaineo/config_flow.py
          custom_components/plaineo/conversation.py
